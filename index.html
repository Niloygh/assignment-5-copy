<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="max-w-[520px] mx-auto my-2 card bg-base-100 w-full shrink-0 shadow-xl">
        <div class="text-center">
            <div class="flex justify-center mb-3">
                <img class="" src="assets/github-logo.png" alt="">
            </div>
            <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            <p class="gray">Sign in to manage your issues</p>
        </div>

        <div class="">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="text-[14px] font-bold">Username</label>
                    <input id="username" type="email" class="input w-full" placeholder="Enter Username" />
                    <p class="text-[#4A00FF]">Default: admin</p>

                    <label class="text-[14px] font-bold">Password</label>
                    <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
                    <p class="text-[#4A00FF]">Default: admin123</p>

                    <button id="signInBtn" class="btn bg-primary mt-4">Sign In</button>
                </fieldset>
            </div>
        </div>
        <div class="">
            <p class="flex gap-5">
                <span class="border-t w-full mt-3 text-black/20"></span>
                <span>OR</span>
                <span class="border-t w-full mt-3 text-black/20"></span>
            </p>
            <p class="text-center py-3">Demo Credentials:</p>

            <div class="bg-[#64748B]/10 py-4 mx-4">
                <p class="text-center"><span class="font-bold">Username: </span>admin</p>
                <p class="text-center pl-5"><span class="font-bold">Password: </span>admin123</p>
            </div>
        </div>
        
    </div>

    <script src="js/login.js"></script>
</body>

</html>
